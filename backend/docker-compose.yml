# Стек бэкенда экосистемы STAW: Django 5 + DRF + PostgreSQL/PostGIS.
# Единый общий бэкенд для всех 3 продуктов на :8000 (прежний FastAPI удалён, D-12).
#
# Запуск (когда Docker Desktop работает):  cd backend && docker compose up -d
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: kvartal
      POSTGRES_USER: kvartal
      POSTGRES_PASSWORD: kvartal
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kvartal -d kvartal"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: ./django_api
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: dev-secret-change-in-prod
      POSTGRES_DB: kvartal
      POSTGRES_USER: kvartal
      POSTGRES_PASSWORD: kvartal
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - ./django_api:/app
      # Фото товаров (dev): отдаём существующие ассеты Store по сети как /media/products/*,
      # чтобы Квартал показывал мини-фото кроссовок. Прод — реальный CDN/медиа-хранилище.
      - ../sport_store/assets/images/products:/srv/media/products:ro
      # Загруженные через админку фото — отдельный записываемый том (/media/uploads/*).
      - media_uploads:/srv/media/uploads
    ports:
      - "8000:8000"   # Django на хосте :8000 — приложения ходят сюда (adb reverse tcp:8000).
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  media_uploads:

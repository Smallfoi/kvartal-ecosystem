<text x="60" y="989" class="section">ПРАВИЛА ЗАХВАТА</text>
<text x="62" y="1021" class="body">1. Во время бега показываем маршрут</text>
<text x="62" y="1048" class="body">2. В финале считаем прирост территории</text>
<text x="62" y="1075" class="body">3. Нет новой площади - нет захвата</text>
<text x="62" y="1102" class="body">4. Своя территория = единая геометрия</text>
<rect x="920" y="955" width="840" height="170" rx="18" class="panel" stroke="#ffae5c"/>

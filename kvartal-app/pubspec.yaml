name: kvartal_app
description: "       "
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.6.3

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # GPS
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Charts
  fl_chart: ^0.70.2

  # Animations
  flutter_animate: ^4.5.2

  # HTTP
  dio: ^5.8.0+1

  # Local storage
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4

  # Utils
  intl: ^0.20.2
  equatable: ^2.0.7

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.4
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/brand/
    - assets/zones.json

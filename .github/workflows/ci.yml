name: CI

# Проверки качества для монорепо экосистемы STAW.
# Гоняются на каждый push в main и на каждый Pull Request в main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Отменяем устаревшие прогоны для той же ветки/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Flutter · ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [kvartal-app, sport_store]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.1
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  backend:
    name: Backend · Django
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/django_api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check
